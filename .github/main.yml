name: Sentinel-H Security Audit

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Python Setup
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: pip install python-dotenv
      - name: Static Analysis Test Run
        run: python3 -m unittest discover tests
      - name: Container Integrity Build
        run: docker build -t sentinel-h-check .
